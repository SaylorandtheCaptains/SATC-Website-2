backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

local_backend: false

collections:

  - name: "shows"
    label: "Shows"
    label_singular: "Show"
    description: "Add or remove upcoming show dates. Past shows hide automatically on the website."
    folder: "_shows"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{venue}}"
    identifier_field: "venue"
    fields:
      - label: "Venue Name"
        name: "venue"
        widget: "string"
        hint: "e.g. Ellie Mae's Tiki Bar"
      - label: "Date"
        name: "date"
        widget: "date"
        format: "YYYY-MM-DD"
      - label: "Location"
        name: "location"
        widget: "string"
        hint: "e.g. Cape Canaveral, FL"
      - label: "Show Time"
        name: "time"
        widget: "string"
        hint: "e.g. 7:00 PM - 10:00 PM"
      - label: "Ticket URL"
        name: "ticket_url"
        widget: "string"
        required: false
        hint: "Leave blank for free shows"

  - name: "quotes"
    label: "Fan Quotes"
    label_singular: "Quote"
    description: "Fan and press quotes shown in the Feedback section."
    folder: "_quotes"
    create: true
    delete: true
    slug: "{{source}}"
    identifier_field: "source"
    fields:
      - label: "Quote"
        name: "quote"
        widget: "text"
        hint: "Do not include quotation marks - the site adds them."
      - label: "Source"
        name: "source"
        widget: "string"
        hint: "e.g. Sam, three-time attendee"

  - name: "gallery"
    label: "Gallery"
    description: "Photos and YouTube videos for the Gallery section."
    files:
      - name: "gallery_content"
        label: "Photos and Videos"
        file: "_data/gallery.json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
              - label: "Caption"
                name: "alt"
                widget: "string"
          - label: "Videos"
            name: "videos"
            widget: "list"
            fields:
              - label: "YouTube Embed URL"
                name: "url"
                widget: "string"
                hint: "https://www.youtube.com/embed/VIDEO_ID"
              - label: "Caption"
                name: "caption"
                widget: "string"

  - name: "site"
    label: "Site Content"
    files:

      - name: "about"
        label: "About Section"
        file: "_data/about.json"
        fields:
          - label: "Paragraph 1"
            name: "p1"
            widget: "text"
          - label: "Paragraph 2"
            name: "p2"
            widget: "text"
          - label: "Paragraph 3"
            name: "p3"
            widget: "text"
          - label: "Featured Quote"
            name: "featured_quote"
            widget: "text"
          - label: "Featured Quote Source"
            name: "featured_quote_source"
            widget: "string"

      - name: "booking"
        label: "Booking Section"
        file: "_data/booking.json"
        fields:
          - label: "Section Heading"
            name: "heading"
            widget: "string"
          - label: "Body Text"
            name: "body"
            widget: "text"
          - label: "Booking Email"
            name: "email"
            widget: "string"
